<script>

const APPS_SCRIPT_URL =
'https://script.google.com/macros/s/AKfycbyWkQh5LK6Sic0WKwhIulyV75P2NHs3hw1cklRJHYF8HvXz5T_Fpc3Vr8T8uQNVsb0LFg/exec';

let products = [];

const quantities = {};

async function loadProducts() {

  const response =
    await fetch(APPS_SCRIPT_URL);

  products =
    await response.json();

  products.forEach(product => {
    quantities[product.id] = 0;
  });

  renderProducts();
  updateTotals();
}

function updateQuantity(productId, change) {

  const product =
    products.find(p => p.id === productId);

  const novaQuantidade =
    quantities[productId] + change;

  if (novaQuantidade < 0) return;

  if (novaQuantidade > product.stock) return;

  quantities[productId] =
    novaQuantidade;

  document.getElementById(`qty-${productId}`).value =
    quantities[productId];

  updateTotals();
}

function setQuantity(productId, value) {

  const product =
    products.find(p => p.id === productId);

  let quantidade =
    parseInt(value) || 0;

  if (quantidade > product.stock) {
    quantidade = product.stock;
  }

  quantities[productId] =
    quantidade;

  updateTotals();
}

function updateTotals() {

  products.forEach(product => {

    const subtotal =
      product.price *
      quantities[product.id];

    document.getElementById(`subtotal-${product.id}`).textContent =
      `R$ ${subtotal.toFixed(2)}`;

  });

  const total =
    products.reduce((sum, p) => {
      return sum + (
        p.price *
        quantities[p.id]
      );
    }, 0);

  document.getElementById('totalDisplay').textContent =
    `R$ ${total.toFixed(2)}`;

  document.getElementById('finalizarBtn').disabled =
    total === 0;
}

function renderProducts() {

  const container =
    document.getElementById('products');

  container.innerHTML =
    products.map(product => `

    <div class="bg-gray-50 rounded-xl p-4 border border-gray-300">

      <div class="flex justify-between items-start mb-3">

        <div>

          <h3 class="font-semibold text-gray-900 text-lg">
            ${product.name}
          </h3>

          ${
            product.stock <= 0
            ? '<p class="text-red-600 font-bold text-sm">ESGOTADO</p>'
            : ''
          }

          <p class="text-yellow-600 font-medium">
            R$ ${product.price.toFixed(2)}
          </p>

          <p class="text-sm text-gray-500 mt-1">
            Estoque: ${product.stock}
          </p>

        </div>

        <div class="text-right">

          <p class="text-sm text-gray-500">
            Subtotal
          </p>

          <p
            id="subtotal-${product.id}"
            class="font-bold text-gray-900"
          >
            R$ 0,00
          </p>

        </div>

      </div>

      <div class="flex items-center gap-3">

        <button
          onclick="updateQuantity('${product.id}', -1)"
          class="w-10 h-10 bg-red-600 hover:bg-red-700 text-white rounded-lg font-bold text-xl flex items-center justify-center"
        >
          −
        </button>

        <input
          type="number"
          id="qty-${product.id}"
          value="0"
          min="0"
          max="${product.stock}"
          onchange="setQuantity('${product.id}', this.value)"
          class="flex-1 text-center text-xl font-semibold border-2 border-gray-300 rounded-lg py-2"
        />

        <button
          onclick="updateQuantity('${product.id}', 1)"
          class="w-10 h-10 bg-green-600 hover:bg-green-700 text-white rounded-lg font-bold text-xl flex items-center justify-center"
        >
          +
        </button>

      </div>

    </div>

  `).join('');
}

document.getElementById('finalizarBtn')
.addEventListener('click', async () => {

  const nome =
    document.getElementById('customerName')
    .value
    .trim();

  const total =
    products.reduce((sum, p) => {
      return sum + (
        p.price *
        quantities[p.id]
      );
    }, 0);

  const pedido = {
    nome,
    produtos: quantities,
    total
  };

  await fetch(APPS_SCRIPT_URL, {
    method: 'POST',
    headers: {
      'Content-Type': 'text/plain'
    },
    body: JSON.stringify(pedido)
  });

  alert('Pedido registrado!');

  location.reload();

});

loadProducts();

</script>
