<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Painel de Estoque</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">

  <style>
    body {
      font-family: 'Montserrat', sans-serif;
    }
  </style>
</head>

<body class="min-h-screen bg-gradient-to-br from-neutral-900 to-black p-4">

  <div class="max-w-2xl mx-auto bg-white rounded-2xl shadow-xl overflow-hidden">

    <!-- HEADER -->
    <div class="bg-black p-6 text-white border-b-4 border-yellow-600">
      <div class="flex items-center gap-4">

        <img
          src="https://raw.githubusercontent.com/gremiocoliseu/freezer-app/main/logo-grec-coliseu.png.jpeg"
          class="w-14 h-14 object-contain"
        >

        <div>
          <h1 class="text-xl font-semibold tracking-widest uppercase">
            Painel de Estoque
          </h1>

          <p class="text-yellow-500 text-sm tracking-wide">
            Freezer Coliseu
          </p>
        </div>
      </div>
    </div>

    <!-- PRODUTOS -->
    <div id="products" class="p-6 space-y-4"></div>

    <!-- ADICIONAR PRODUTO -->
    <div class="p-6 border-t bg-gray-50">

      <h2 class="text-lg font-bold mb-4 text-gray-800">
        Novo Produto
      </h2>

      <div class="space-y-3">

        <input
          type="text"
          id="newName"
          placeholder="Nome do produto"
          class="w-full border border-gray-300 rounded-lg px-4 py-3"
        >

        <input
          type="number"
          id="newPrice"
          placeholder="Preço"
          class="w-full border border-gray-300 rounded-lg px-4 py-3"
        >

        <input
          type="number"
          id="newStock"
          placeholder="Quantidade inicial"
          class="w-full border border-gray-300 rounded-lg px-4 py-3"
        >

        <button
          onclick="addProduct()"
          class="w-full bg-yellow-600 hover:bg-yellow-700 text-black font-bold py-3 rounded-xl"
        >
          Adicionar Produto
        </button>

      </div>
    </div>

  </div>

  <script>

    let products = JSON.parse(localStorage.getItem('estoque')) || [
      {
        id: 'energetico',
        name: 'Energético',
        price: 10,
        stock: 20
      },
      {
        id: 'refrigerante',
        name: 'Refrigerante',
        price: 5,
        stock: 35
      },
      {
        id: 'isotonico',
        name: 'Isotônico',
        price: 5.5,
        stock: 15
      },
      {
        id: 'whey',
        name: 'Whey',
        price: 6,
        stock: 12
      }
    ];

    function saveProducts() {
      localStorage.setItem('estoque', JSON.stringify(products));
    }

    function updateStock(id, change) {

      const product = products.find(p => p.id === id);

      if (!product) return;

      product.stock = Math.max(0, product.stock + change);

      saveProducts();

      renderProducts();
    }

    function deleteProduct(id) {

      const confirmDelete = confirm('Excluir produto?');

      if (!confirmDelete) return;

      products = products.filter(p => p.id !== id);

      saveProducts();

      renderProducts();
    }

    function addProduct() {

      const name = document.getElementById('newName').value.trim();
      const price = parseFloat(document.getElementById('newPrice').value);
      const stock = parseInt(document.getElementById('newStock').value);

      if (!name || isNaN(price) || isNaN(stock)) {
        alert('Preencha todos os campos');
        return;
      }

      const id = name.toLowerCase().replace(/\s+/g, '-');

      products.push({
        id,
        name,
        price,
        stock
      });

      saveProducts();

      document.getElementById('newName').value = '';
      document.getElementById('newPrice').value = '';
      document.getElementById('newStock').value = '';

      renderProducts();
    }

    function renderProducts() {

      const container = document.getElementById('products');

      container.innerHTML = products.map(product => `

        <div class="bg-gray-50 rounded-xl p-4 border border-gray-300">

          <div class="flex justify-between items-start mb-4">

            <div>
              <h3 class="font-bold text-lg text-gray-900">
                ${product.name}
              </h3>

              <p class="text-yellow-600 font-semibold">
                R$ ${product.price.toFixed(2)}
              </p>
            </div>

            <button
              onclick="deleteProduct('${product.id}')"
              class="bg-red-600 hover:bg-red-700 text-white px-3 py-2 rounded-lg"
            >
              Excluir
            </button>

          </div>

          <div class="bg-white rounded-lg p-4 border">

            <div class="flex justify-between items-center mb-3">

              <span class="text-gray-700 font-medium">
                Estoque atual
              </span>

              <span class="text-2xl font-bold text-gray-900">
                ${product.stock}
              </span>

            </div>

            <div class="flex gap-3">

              <button
                onclick="updateStock('${product.id}', -1)"
                class="flex-1 bg-red-600 hover:bg-red-700 text-white py-3 rounded-xl font-bold"
              >
                -1
              </button>

              <button
                onclick="updateStock('${product.id}', 1)"
                class="flex-1 bg-green-600 hover:bg-green-700 text-white py-3 rounded-xl font-bold"
              >
                +1
              </button>

            </div>

          </div>

        </div>

      `).join('');
    }

    renderProducts();

  </script>

</body>
</html>
